<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MITAOE Parking</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #F5C518;
      --dark:   #0E0E0E;
      --mid:    #1A1A1A;
      --line:   #2C2C2C;
      --text:   #E8E8E8;
      --muted:  #666;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── Grid lines ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: .35;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Yellow top stripe ── */
    body::after {
      content: '';
      position: fixed; top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--yellow);
      z-index: 10;
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 2rem;
    }

    /* ── Badge ── */
    .badge {
      font-family: 'DM Sans', sans-serif;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--yellow);
      border: 1px solid var(--yellow);
      padding: .3rem .8rem;
      border-radius: 2px;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp .5s .1s forwards;
    }

    /* ── Title ── */
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 10vw, 7rem);
      line-height: .95;
      text-align: center;
      letter-spacing: .03em;
      color: #fff;
      opacity: 0;
      animation: fadeUp .5s .25s forwards;
    }

    h1 span {
      color: var(--yellow);
      display: block;
    }

    .sub {
      margin-top: 1rem;
      font-size: .85rem;
      color: var(--muted);
      letter-spacing: .05em;
      opacity: 0;
      animation: fadeUp .5s .38s forwards;
    }

    /* ── Divider ── */
    .divider {
      width: 48px;
      height: 2px;
      background: var(--yellow);
      margin: 2.5rem 0;
      opacity: 0;
      animation: fadeUp .4s .5s forwards;
    }

    /* ── Buttons ── */
    .btn-group {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp .5s .6s forwards;
    }

    .btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: .3rem;
      padding: 1.6rem 2.4rem;
      min-width: 220px;
      border: 1px solid var(--line);
      background: var(--mid);
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      border-radius: 4px;
      transition: border-color .2s, transform .2s, background .2s;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--yellow);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .25s ease;
      z-index: 0;
      opacity: .08;
    }

    .btn:hover::before { transform: scaleX(1); }
    .btn:hover {
      border-color: var(--yellow);
      transform: translateY(-3px);
    }

    .btn-icon {
      position: relative;
      z-index: 1;
      font-size: 1.5rem;
      line-height: 1;
    }

    .btn-label {
      position: relative;
      z-index: 1;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: .06em;
      line-height: 1;
    }

    .btn-desc {
      position: relative;
      z-index: 1;
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    /* Student btn accent */
    .btn-student { border-left: 3px solid var(--yellow); }
    /* Guard btn accent */
    .btn-guard   { border-left: 3px solid #60A5FA; }
    .btn-guard .btn-icon { color: #60A5FA; }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 1.4rem;
      font-size: .68rem;
      letter-spacing: .06em;
      color: var(--muted);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp .4s .8s forwards;
    }

    /* ── Parking-slot deco (bottom corners) ── */
    .slot {
      position: fixed;
      width: 80px; height: 80px;
      border: 1px solid var(--line);
      opacity: .4;
    }
    .slot-bl { bottom: 40px; left: 40px; border-right: none; border-top: none; }
    .slot-br { bottom: 40px; right: 40px; border-left: none; border-top: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .btn { min-width: 90%; }
      .btn-group { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="badge">MITAOE · Campus Parking</div>

    <h1>Smart<span>Parking</span></h1>
    <p class="sub">Car Mapping &amp; Management System</p>

    <div class="divider"></div>

    <div class="btn-group">
      <a href="student/index.html" class="btn btn-student">
        <span class="btn-icon">🎓</span>
        <span class="btn-label">Student App</span>
        <span class="btn-desc">Find &amp; track your spot</span>
      </a>
      <a href="guard/index.html" class="btn btn-guard">
        <span class="btn-icon">🛡️</span>
        <span class="btn-label">Guard App</span>
        <span class="btn-desc">Monitor &amp; manage parking</span>
      </a>
    </div>
  </div>

  <footer>Group 2 · CS3 · Design Thinking Project</footer>

  <div class="slot slot-bl"></div>
  <div class="slot slot-br"></div>

</body>
</html>
